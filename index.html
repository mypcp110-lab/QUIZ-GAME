<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root { --main-bg: #0d1117; --card-bg: #161b22; --accent: #58a6ff; --danger: #f85149; --success: #2ea043; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--main-bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .setup-screen, .quiz-screen { width: 98%; max-width: 1400px; text-align: center; margin-top: 20px; }
        h1 { color: var(--accent); font-size: 26px; }
        
        /* ڕێکخستنی ٩ کەتەگۆرییەکە */
        .categories-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* ٣ ستون لە هەر ڕیزێک */
            gap: 15px; 
            margin-top: 20px; 
        }
        
        @media (min-width: 1000px) {
            .categories-grid { grid-template-columns: repeat(9, 1fr); gap: 8px; } /* لە شاشەی گەورە هەمووی لە یەک ڕیزدایە */
        }

        .category-column { background: var(--card-bg); padding: 8px; border-radius: 10px; border: 1px solid #30363d; }
        .category-name { font-weight: bold; margin-bottom: 10px; color: var(--accent); font-size: 18px; border-bottom: 2px solid var(--accent); padding-bottom: 5px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        
        .cells-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
        .cell { background: #21262d; border: 1px solid #30363d; color: white; padding: 8px 0; cursor: pointer; border-radius: 5px; font-size: 15px; transition: 0.2s; }
        .cell:hover { background: var(--accent); color: white; }
        .cell.used { background: #0d1117; color: #484f58; cursor: not-allowed; border: 1px dashed #30363d; }

        .question-box { background: var(--card-bg); padding: 40px; border-radius: 20px; margin-top: 30px; display: none; border: 2px solid var(--accent); width: 80%; max-width: 800px; }
        #question-text { font-size: 28px; margin-bottom: 30px; line-height: 1.5; font-weight: 500; }
        .timer { font-size: 40px; color: var(--danger); font-weight: bold; margin-bottom: 20px; font-family: monospace; }
        
        .option-btn { display: block; width: 100%; padding: 18px; margin: 12px 0; background: #21262d; color: white; border: 2px solid #30363d; border-radius: 12px; cursor: pointer; font-size: 22px; transition: 0.3s; }
        .correct { background-color: var(--success) !important; border-color: #3fb950 !important; }
        .wrong { background-color: var(--danger) !important; border-color: #f85149 !important; }

        .group-info { margin-bottom: 15px; font-size: 24px; color: #ecf0f1; background: #21262d; padding: 10px 30px; border-radius: 50px; border: 1px solid var(--accent); }
        .custom-file-upload { background: var(--accent); color: white; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 20px; display: inline-block; transition: 0.3s; }
        .custom-file-upload:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-screen">
        <h1>بەخێرهاتی بۆ یاری کێبڕکێ</h1>
        <br><br>
        <label for="file-upload" class="custom-file-upload">داغڵکردنی فایلی ١٨٠ پرسیارەکە (JSON)</label>
        <input id="file-upload" type="file" style="display:none" accept=".json"/>
    </div>

    <div id="main-game" style="display:none" class="setup-screen">
        <div class="group-info" id="turn-info">سەرەی: گرووپی ١</div>
        <div class="categories-grid" id="categories-container"></div>
    </div>

    <div id="quiz-screen" class="question-box">
        <div class="timer" id="timer">25</div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

<script>
    let allData = {};
    let currentGroup = 1;
    let timerInterval;
[5/2/2026 2:14 PM] گەیلان: const categories = ["دەنگ", "مێژوو", "هونەری", "وەرزشی", "منداڵان", "تەندروستی", "زانستی", "کەسی", "ئاینی"];

    document.getElementById('file-upload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                allData = JSON.parse(event.target.result);
                renderGrid();
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'block';
            } catch(err) {
                alert("هەڵە لە فایلی JSON هەیە!");
            }
        };
        reader.readAsText(e.target.files[0]);
    });

    function renderGrid() {
        const container = document.getElementById('categories-container');
        container.innerHTML = '';
        categories.forEach(cat => {
            const col = document.createElement('div');
            col.className = 'category-column';
            col.innerHTML = <div class="category-name">${cat}</div>;
            const cellsDiv = document.createElement('div');
            cellsDiv.className = 'cells-grid';
            
            for(let i=1; i<=20; i++) {
                const btn = document.createElement('button');
                btn.className = 'cell';
                btn.id = cell-${cat}-${i};
                btn.innerText = i;
                btn.onclick = () => startQuestion(cat, i);
                cellsDiv.appendChild(btn);
            }
            col.appendChild(cellsDiv);
            container.appendChild(col);
        });
    }

    function startQuestion(cat, num) {
        if(!allData[cat] || !allData[cat][num-1]) {
            alert("ئەم پرسیارە لە فایلەکەدا بوونی نییە!");
            return;
        }
        const q = allData[cat][num-1];
        document.getElementById('main-game').style.display = 'none';
        const screen = document.getElementById('quiz-screen');
        screen.style.display = 'block';
        document.getElementById('question-text').innerText = q.question;
        
        const opts = document.getElementById('options-container');
        opts.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = function() { checkAns(this, opt, q.answer, cat, num); };
            opts.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        let time = 25;
        document.getElementById('timer').innerText = time;
        document.getElementById('timer').style.color = "var(--danger)";
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if(time <= 0) {
                clearInterval(timerInterval);
                document.getElementById('question-text').innerText = "کات تەواو بوو! ⏱️";
                setTimeout(backToHome, 2000);
            }
        }, 1000);
    }

    function checkAns(btn, selected, correct, cat, num) {
        clearInterval(timerInterval);
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(selected === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        setTimeout(() => {
            document.getElementById(`cell-${cat}-${num}`).classList.add('used');
            document.getElementById(`cell-${cat}-${num}`).disabled = true;
            backToHome();
        }, 3000);
    }

    function backToHome() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        currentGroup = currentGroup === 1 ? 2 : 1;
        document.getElementById('turn-info').innerText = سەرەی: گرووپی ${currentGroup};
    }
