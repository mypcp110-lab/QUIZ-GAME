<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کێبڕکێی گرووپەکان - دیزاینی کۆتایی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root { 
            --main-bg: #0b0e14; 
            --card-bg: #161b22; 
            --accent-blue: #58a6ff; 
            --border-color: #30363d;
            --text-white: #ffffff;
        }

        * {
            user-select: none;
            box-sizing: border-box;
            font-family: 'Noto Sans Arabic', Tahoma, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            background-color: var(--main-bg); 
            color: var(--text-white); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- شاشەی چوونەژوورەوە --- */
        .login-container {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid var(--accent-blue);
            text-align: center;
            width: 380px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.1);
        }

        .login-container h2 { font-weight: 900; margin-bottom: 30px; font-size: 28px; }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            text-align: center;
            outline: none;
        }

        /* لادانی نوسینی کاڵ لە کاتی کلیک کردن */
        input:focus::placeholder { color: transparent; }
        input:focus::-webkit-input-placeholder { color: transparent; }

        .login-btn {
            background: var(--accent-blue);
            color: black;
            border: none;
            padding: 10px 35px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 18px;
        }

        /* --- شاشەی Setup --- */
        .setup-box { display: flex; flex-direction: column; gap: 15px; width: 320px; margin: 0 auto; }
        .action-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover { border-color: var(--accent-blue); background: #21262d; }

        /* --- یاری سەرەکی --- */
        .main-wrapper { display: none; width: 95%; max-width: 1100px; text-align: center; }

        .categories-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-top: 20px;
        }

        .category-card {
            background: var(--card-bg);
            padding: 55px 20px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 26px;
            font-weight: 900;
            transition: 0.3s ease;
        }
        .category-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }

        /* --- ژمارەکان --- */
        .numbers-view { display: none; }
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }
        .number-cell {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 25px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }
        .number-cell:hover { border-color: var(--accent-blue); }
        .number-cell.used { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .back-btn {
            position: fixed; top: 30px; right: 30px;
            background: #21262d; border: 1px solid var(--border-color);
            color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer;
        }

        /* --- پەنجەرەی پرسیار (Modal) --- */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 40px; border-radius: 20px; border: 2px solid var(--accent-blue);
            width: 90%; max-width: 750px; text-align: center;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .option-btn {
            background: #0d1117; border: 1px solid var(--border-color);
            color: white; padding: 18px; border-radius: 10px;
            cursor: pointer; font-size: 19px; transition: 0.3s;
        }
        .option-btn:hover { background: var(--accent-blue); color: black; }
        .close-modal {
            margin-top: 30px; background: #f85149; border: none;
            color: white; padding: 10px 30px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ١. چوونەژوورەوە -->
<div id="login-screen" class="login-container">
    <h2>چوونەژوورەوە</h2>
    <input type="text" id="user" placeholder="UserName" autocomplete="off">
    <input type="password" id="pass" placeholder="Password">
    <button class="login-btn" onclick="handleLogin()">Login</button>
</div>

<!-- ٢. شاشەی Setup -->
<div id="setup-screen" style="display:none; text-align: center;">
    <h1 style="font-weight: 900; font-size: 45px; margin-bottom: 40px;">بەخێربێن</h1>
    <div class="setup-box">
        <button class="action-btn" onclick="document.getElementById('file-input').click()">Import file</button>
        <button class="action-btn" onclick="location.reload()">Restart</button>
        <button class="action-btn">Delete</button>
        <button class="action-btn">Leave</button>
    </div>
    <input type="file" id="file-input" style="display:none" accept=".json">
</div>

<!-- ٣. یاریەکە -->
<div id="main-game" class="main-wrapper">
    <div id="categories-view">
        <div class="categories-grid" id="cat-container"></div>
    </div>
    <div id="numbers-view" class="numbers-view">
        <button class="back-btn" onclick="showCats()">گەڕانەوە</button>
        <h1 id="cat-title" style="font-weight: 900; font-size: 40px; margin-bottom: 30px; color: var(--accent-blue);"></h1>
        <div id="num-container" class="numbers-grid"></div>
    </div>
</div>

<!-- ٤. مۆدێڵی پرسیار -->
<div id="question-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-q-text" style="font-weight: 900; font-size: 32px;"></h2>
        <div class="options-grid" id="modal-options"></div>
        <button class="close-modal" onclick="closeModal()">داخستن</button>
    </div>
</div>

<script>
    let allData = {};
    let usedQuestions = {};
    // کەتەگۆرییەکان دەبێت ڕێک وەک ناوەکانی ناو فایلە JSONـەکەت بن[cite: 1, 2]
    const categories = ["دەنگ", "مێژوو", "هونەری", "وەرزشی", "منداڵان", "تەندروستی", "زانستی", "کەسی", "ئاینی"];

    function handleLogin() {
        if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "1234") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
        } else { alert("هەڵەیە!"); }
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                allData = JSON.parse(event.target.result); // خوێندنەوەی پرسیارەکان لە فایلی دەرەکی[cite: 3]
                startApp();
            } catch(e) { alert("هەڵە لە فایلی JSON هەیە!"); }
        };
        reader.readAsText(e.target.files[0]);
    });

    function startApp() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        const container = document.getElementById('cat-container');
        container.innerHTML = '';
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'category-card';
            div.innerText = cat;
            div.onclick = () => showNumbers(cat);
            container.appendChild(div);
        });
    }

    function showNumbers(cat) {
        document.getElementById('categories-view').style.display = 'none';
        document.getElementById('numbers-view').style.display = 'block';
        document.getElementById('cat-title').innerText = cat;
        const container = document.getElementById('num-container');
        container.innerHTML = '';
        
        const categoryData = allData[cat] || []; // وەرگرتنی لیستەکە لە فایلەکە[cite: 1]

        for(let i=0; i<20; i++) {
            const btn = document.createElement('div');
            const qKey = `${cat}-${i}`;
            btn.className = 'number-cell' + (usedQuestions[qKey] ? ' used' : '');
            btn.innerText = i + 1;
            btn.onclick = () => {
                if(!usedQuestions[qKey] && categoryData[i]) {
                    openModal(categoryData[i]);
                    usedQuestions[qKey] = true;
                    btn.classList.add('used');
                } else if (!categoryData[i]) {
                    alert("ئەم ژمارەیە پرسیاری بۆ دانەنراوە لە فایلەکەدا!");
                }
            };
            container.appendChild(btn);
        }
    }

    function openModal(data) {
        document.getElementById('modal-q-text').innerText = data.question;
        const optContainer = document.getElementById('modal-options');
        optContainer.innerHTML = '';
        data.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                if(opt === data.answer) { b.style.background = "#2ea043"; alert("ڕاستە!"); }
                else { b.style.background = "#f85149"; alert("هەڵەیە! وەڵام: " + data.answer); }
            };
            optContainer.appendChild(b);
        });
        document.getElementById('question-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('question-modal').style.display = 'none'; }
    function showCats() { document.getElementById('numbers-view').style.display = 'none'; document.getElementById('categories-view').style.display = 'block'; }
</script>
</body>
</html>
