<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کێبڕکێی گرووپەکان - دیزاینی کۆتایی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root { 
            --main-bg: #0b0e14; 
            --card-bg: #161b22; 
            --accent-blue: #58a6ff; 
            --border-color: #30363d;
            --text-white: #ffffff;
        }

        * {
            user-select: none;
            box-sizing: border-box;
            font-family: 'Noto Sans Arabic', Tahoma, sans-serif;
        }

        body { 
            background-color: var(--main-bg); 
            color: var(--text-white); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        /* --- Setup Screen --- */
        #setup-screen { text-align: center; }
        .setup-box { display: flex; flex-direction: column; gap: 15px; width: 320px; margin: 0 auto; }
        .action-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- Main Game --- */
        .main-wrapper { display: none; width: 95%; max-width: 1100px; text-align: center; }
        .categories-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .category-card {
            background: var(--card-bg);
            padding: 55px 20px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 26px;
            font-weight: 900;
            transition: 0.3s;
        }
        .category-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }

        /* --- Numbers Grid --- */
        .numbers-view { display: none; position: relative; }
        .numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 900px; margin: 0 auto; }
        .number-cell {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 25px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .number-cell:hover { border-color: var(--accent-blue); transform: translateY(-5px); }
        .number-cell.used { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }

        /* --- Back Button --- */
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #21262d;
            color: white;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 10;
        }
        .back-btn:hover { border-color: var(--accent-blue); }

        /* --- Quiz Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--accent-blue);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            text-align: center;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .option-btn {
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background: #0d1117;
            color: white;
            transition: 0.3s;
        }
        .option-btn.correct { background: #2ea043 !important; border-color: #3fb950; }
        .option-btn.wrong { background: #da3633 !important; border-color: #f85149; }
        
        #timer-display {
            font-size: 40px;
            font-weight: 900;
            color: #ffde59;
            margin-bottom: 20px;
        }

        .title-display { font-weight: 900; font-size: 45px; margin-bottom: 40px; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 class="title-display">بەخێربێن</h1>
    <div class="setup-box">
        <button class="action-btn" onclick="document.getElementById('file-input').click()">Import file</button>
        <button class="action-btn" onclick="location.reload()">Restart</button>
    </div>
    <input type="file" id="file-input" style="display:none" accept=".json">
</div>

<div id="main-game" class="main-wrapper">
    <div id="categories-view">
        <div class="categories-grid" id="cat-container"></div>
    </div>

    <div id="numbers-view" class="numbers-view">
        <button class="back-btn" onclick="showCats()">گەڕانەوە</button>
        <h1 id="cat-title" class="title-display" style="color: var(--accent-blue);"></h1>
        <div id="num-container" class="numbers-grid"></div>
    </div>
</div>

<div id="quiz-modal" class="modal-overlay">
    <div class="modal-content">
        <div id="timer-display">25</div>
        <h2 id="modal-question"></h2>
        <div id="modal-options" class="options-grid"></div>
    </div>
</div>

<script>
    let allData = {};
    let usedQuestions = {};
    let timerInterval;
    let autoStartTimeout; // بۆ ڕاگرتنی ٣ چرکەکە
    const categories = ["دەنگ", "مێژوو", "هونەری", "وەرزشی", "جوگرافی", "تەندروستی", "زانستی", "کەسی", "ئاینی"];

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                allData = JSON.parse(event.target.result);
                startApp();
            } catch(e) { alert("هەڵە لە فایلەکەدا هەیە!"); }
        };
        reader.readAsText(file);
    });

    function startApp() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        const container = document.getElementById('cat-container');
        container.innerHTML = '';
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'category-card';
            div.innerText = cat;
            div.onclick = () => showNumbers(cat);
            container.appendChild(div);
        });
    }

    function showNumbers(cat) {
        document.getElementById('categories-view').style.display = 'none';
        document.getElementById('numbers-view').style.display = 'block';
        document.getElementById('cat-title').innerText = cat;
        const container = document.getElementById('num-container');
        container.innerHTML = '';
        const categoryQuestions = allData[cat] || [];

        for(let i=1; i<=20; i++) {
            const btn = document.createElement('div');
            const qKey = `${cat}-${i}`;
            btn.className = 'number-cell' + (usedQuestions[qKey] ? ' used' : '');
            btn.innerText = i;
            btn.onclick = () => {
                const questionData = categoryQuestions[i - 1];
                if (questionData) openQuiz(questionData, qKey, btn);
            };
            container.appendChild(btn);
        }
    }

    function showCats() {
        document.getElementById('numbers-view').style.display = 'none';
        document.getElementById('categories-view').style.display = 'block';
    }

    function openQuiz(data, key, element) {
        const modal = document.getElementById('quiz-modal');
        const qText = document.getElementById('modal-question');
        const oContainer = document.getElementById('modal-options');
        const timerText = document.getElementById('timer-display');

        qText.innerText = data.question;
        oContainer.innerHTML = '';
        modal.style.display = 'flex';
        
        let timeLeft = 25;
        timerText.innerText = timeLeft;
        
        clearInterval(timerInterval);
        clearTimeout(autoStartTimeout);

        // دوای ٣ چرکە کاتەکە دەستپێدەکات
        autoStartTimeout = setTimeout(() => {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    revealAnswer(data, oContainer, key, element);
                }
            }, 1000);
        }, 3000);

        data.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                clearInterval(timerInterval);
                clearTimeout(autoStartTimeout); // ئەگەر پێش ٣ چرکەکە وەڵامی دایەوە
                if(opt === data.answer) btn.classList.add('correct');
                else btn.classList.add('wrong');
                revealAnswer(data, oContainer, key, element);
            };
            oContainer.appendChild(btn);
        });
    }

    function revealAnswer(data, container, key, element) {
        const buttons = container.getElementsByTagName('button');
        for(let b of buttons) {
            b.style.pointerEvents = 'none';
            if(b.innerText === data.answer) b.classList.add('correct');
        }

        usedQuestions[key] = true;
        element.classList.add('used');

        // دوای ٥ چرکە پرسیارەکە لادەچێت
        setTimeout(() => {
            document.getElementById('quiz-modal').style.display = 'none';
            showCats();
        }, 5000);
    }
</script>

</body>
</html>
