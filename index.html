<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کێبڕکێی گرووپەکان - مۆدێرن</title>
    <style>
        :root { 
            --main-bg: #0d1117; 
            --card-bg: #161b22; 
            --accent: #58a6ff; 
            --danger: #f85149; 
            --success: #2ea043; 
            --gold: #f2bc1c;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--main-bg); 
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* نۆتفیکەیشنە نوێیەکە */
        #custom-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            background: var(--accent);
            color: white;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* دیزاینی کەتەگۆری و لیست */
        .container { width: 100%; max-width: 1000px; text-align: center; }
        
        .categories-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }

        .category-card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 15px;
            border: 2px solid #30363d;
            cursor: pointer;
            font-size: 22px;
            font-weight: bold;
            transition: 0.3s;
        }

        .category-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .numbers-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
            margin-top: 30px; 
            display: none; 
        }

        .btn-back {
            background: #30363d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .cell { 
            background: #21262d; 
            border: 1px solid #30363d; 
            color: white; 
            padding: 20px; 
            cursor: pointer; 
            border-radius: 10px; 
            font-size: 18px; 
            transition: 0.2s;
        }

        .cell:hover { background: var(--accent); }
        .cell.used { background: #0d1117 !important; color: #484f58 !important; cursor: not-allowed; opacity: 0.5; }

        .question-box { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            display: none; 
            border: 2px solid var(--accent); 
            width: 90%;
            max-width: 800px;
        }

        .option-btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: #21262d; 
            color: white; 
            border: 2px solid #30363d; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 20px; 
        }

        .correct { background-color: var(--success) !important; border-color: #aff5b4; }
        .wrong { background-color: var(--danger) !important; border-color: #ffb4b0; }
        
        .timer { font-size: 45px; color: var(--danger); font-weight: bold; margin-bottom: 20px; }
        .group-info { font-size: 24px; color: var(--gold); margin-bottom: 20px; }
        .import-btn { background: var(--accent); color: white; padding: 15px 40px; border-radius: 10px; cursor: pointer; border: none; font-size: 20px; }
    </style>
</head>
<body>

    <div id="custom-alert"></div>

    <div id="setup-screen" class="container">
        <h1>بەخێرهاتی بۆ کێبڕکێ</h1>
        <input type="file" id="file-input" style="display:none" accept=".json">
        <button class="import-btn" onclick="document.getElementById('file-input').click()">داگرتنی فایلی JSON</button>
    </div>

    <div id="main-game" style="display:none" class="container">
        <div class="group-info" id="turn-info">سەرەی: گرووپی ١</div>
        
        <!-- بەشی کەتەگۆرییەکان -->
        <div id="categories-view" class="categories-grid"></div>

        <!-- بەشی ژمارەکان (سەرەتا شاراوەیە) -->
        <div id="numbers-view">
            <button class="btn-back" onclick="showCategories()">گەڕانەوە بۆ کەتەگۆرییەکان</button>
            <h2 id="selected-cat-title" style="color: var(--accent);"></h2>
            <div id="cells-container" class="numbers-grid"></div>
        </div>
    </div>

    <div id="quiz-screen" class="question-box">
        <div class="timer" id="timer">25</div>
        <div id="question-text" style="font-size: 28px; margin-bottom: 20px;"></div>
        <div id="options-container"></div>
    </div>

<script>
    let allData = {};
    let currentGroup = 1;
    let timerInterval;
    let usedQuestions = {}; // بۆ هەڵگرتنی ئەو پرسیارانەی بەکارهاتوون
    const categories = ["دەنگ", "مێژوو", "هونەری", "وەرزشی", "منداڵان", "تەندروستی", "زانستی", "کەسی", "ئاینی"];

    // فەنکشنی نۆتفیکەیشن
    function notify(msg, type = 'info') {
        const alertBox = document.getElementById('custom-alert');
        alertBox.innerText = msg;
        alertBox.style.display = 'block';
        alertBox.style.background = type === 'danger' ? 'var(--danger)' : 'var(--accent)';
        setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                allData = JSON.parse(event.target.result);
                renderCategories();
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'block';
                notify("فایلەکە بە سەرکەوتوویی بارکرا");
            } catch (err) { notify("هەڵە لە فایلەکەدا هەیە", "danger"); }
        };
        reader.readAsText(file);
    });

    function renderCategories() {
        const container = document.getElementById('categories-view');
        container.innerHTML = '';
        document.getElementById('numbers-view').style.display = 'none';
        container.style.display = 'grid';

        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerText = cat;
            card.onclick = () => showNumbers(cat);
            container.appendChild(card);
        });
    }

    function showNumbers(cat) {
        document.getElementById('categories-view').style.display = 'none';
        const view = document.getElementById('numbers-view');
        const container = document.getElementById('cells-container');
        view.style.display = 'block';
        container.style.display = 'grid';
        document.getElementById('selected-cat-title').innerText = "کەتەگۆری: " + cat;
        
        container.innerHTML = '';
        for(let i=1; i<=20; i++) {
            const btn = document.createElement('button');
            btn.className = 'cell';
            const qKey = `${cat}-${i}`;
            if(usedQuestions[qKey]) btn.classList.add('used');
            
            btn.innerText = i;
            btn.onclick = () => {
                if(!usedQuestions[qKey]) startQuestion(cat, i);
            };
            container.appendChild(btn);
        }
    }

    function showCategories() {
        document.getElementById('numbers-view').style.display = 'none';
        document.getElementById('categories-view').style.display = 'grid';
    }

    function startQuestion(cat, num) {
        if (!allData[cat] || !allData[cat][num-1]) {
            notify("ئەم ژمارەیە بوونی نییە", "danger");
            return;
        }

        const q = allData[cat][num-1];
        document.getElementById('main-game').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('question-text').innerText = q.question;
        
        const opts = document.getElementById('options-container');
        opts.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = function() { checkAns(this, opt, q.answer, cat, num); };
            opts.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        let time = 25;
        document.getElementById('timer').innerText = time;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if(time <= 0) {
                clearInterval(timerInterval);
                notify("کات تەواو بوو!", "danger");
                setTimeout(backToHome, 2000);
            }
        }, 1000);
    }

    function checkAns(btn, selected, correct, cat, num) {
        clearInterval(timerInterval);
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(selected === correct) {
            btn.classList.add('correct');
            notify("وەڵامەکەت ڕاستە! 🎉");
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            notify("وەڵامەکەت هەڵەیە ❌", "danger");
        }

        usedQuestions[`${cat}-${num}`] = true;
        setTimeout(backToHome, 3000);
    }

    function backToHome() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        currentGroup = currentGroup === 1 ? 2 : 1;
        document.getElementById('turn-info').innerText = `سەرەی: گرووپی ${currentGroup}`;
        showCategories(); // دەگەڕێتەوە سەر لیستە سەرەکییەکە
    }
</script>
</body>
</html>
