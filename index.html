<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>کێبڕکێی گرووپەکان - سیستەمی فایل</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { --bg: #0b0e14; --card: #161b22; --blue: #58a6ff; --correct: #2ea043; --wrong: #f85149; }
        * { user-select: none; box-sizing: border-box; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--blue); text-align: center; width: 400px; }
        .btn-main { background: var(--blue); color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }

        .game-wrapper { display: none; width: 95%; max-width: 1100px; text-align: center; }
        .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .cat-card { background: var(--card); padding: 50px 10px; border-radius: 15px; border: 1px solid #30363d; cursor: pointer; font-size: 24px; font-weight: 900; transition: 0.3s; }
        .cat-card:hover { border-color: var(--blue); transform: translateY(-5px); }

        .num-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 15px; margin-top: 20px; }
        .num-cell { background: var(--card); border: 1px solid #30363d; padding: 25px; font-size: 24px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .num-cell.used { opacity: 0.2; cursor: not-allowed; background: #000; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 20px; border: 2px solid var(--blue); width: 90%; max-width: 700px; text-align: center; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .opt-btn { background: #0d1117; border: 1px solid #30363d; color: white; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 20px; }
        .correct { background: var(--correct) !important; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; border-color: var(--wrong) !important; }
    </style>
</head>
<body>

<div id="start-screen" class="container">
    <h1 style="margin-bottom: 30px;">کێبڕکێی گرووپەکان</h1>
    <button class="btn-main" onclick="document.getElementById('fileInput').click()">هەڵبژاردنی فایلی JSON</button>
    <input type="file" id="fileInput" style="display:none" accept=".json">
</div>

<div id="game-screen" class="game-wrapper">
    <div id="cat-view">
        <h1 style="font-size: 35px; color: var(--blue);">کەتەگۆرییەکان</h1>
        <div id="cat-grid" class="cat-grid"></div>
    </div>
    <div id="num-view" style="display:none">
        <h1 id="cat-title" style="color:var(--blue); font-size: 40px;"></h1>
        <div id="num-grid" class="num-grid"></div>
        <button onclick="showCats()" style="margin-top:40px; color:#888; background:none; border:1px solid #444; padding:10px 20px; border-radius:10px; cursor:pointer;">گەڕانەوە بۆ کەتەگۆرییەکان</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="q-text" style="font-size: 30px;"></h2>
        <div id="opts" class="opt-grid"></div>
    </div>
</div>

<script>
    let gameData = {};
    let usedIds = new Set();

    // خوێندنەوەی فایلەکە[cite: 1]
    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                gameData = JSON.parse(event.target.result);[cite: 1]
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                showCats();
            } catch(err) {
                alert("هەڵە هەیە لە فایلی JSON!");
            }
        };
        reader.readAsText(e.target.files[0]);
    };

    function showCats() {
        document.getElementById('num-view').style.display = 'none';
        document.getElementById('cat-view').style.display = 'block';
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = '';
        
        // دروستکردنی دوگمەکان بۆ کەتەگۆرییەکان
        Object.keys(gameData).forEach(cat => {
            const div = document.createElement('div');
            div.className = 'cat-card';
            div.innerText = cat;
            div.onclick = () => showNumbers(cat);
            grid.appendChild(div);
        });
    }

    function showNumbers(cat) {
        document.getElementById('cat-view').style.display = 'none';
        document.getElementById('num-view').style.display = 'block';
        document.getElementById('cat-title').innerText = cat;
        const grid = document.getElementById('num-grid');
        grid.innerHTML = '';
        
        const questions = gameData[cat] || [];[cite: 1]
        questions.forEach((q, index) => {
            const cell = document.createElement('div');
            const qKey = cat + index;
            cell.className = 'num-cell' + (usedIds.has(qKey) ? ' used' : '');
            cell.innerText = index + 1;
            cell.onclick = () => { if(!usedIds.has(qKey)) openQuestion(q, qKey); };
            grid.appendChild(cell);
        });
    }

    function openQuestion(q, key) {
        document.getElementById('q-text').innerText = q.question;
        const optBox = document.getElementById('opts');
        optBox.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const allBtns = optBox.querySelectorAll('button');
                allBtns.forEach(b => b.disabled = true);
                usedIds.add(key);
                
                if(opt === q.answer) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    allBtns.forEach(b => { if(b.innerText === q.answer) b.classList.add('correct'); });
                }
                
                setTimeout(() => {
                    document.getElementById('modal').style.display = 'none';
                    showCats(); // گەڕانەوە بۆ بەشی کەتەگۆرییەکان دوای وەڵام
                }, 1500);
            };
            optBox.appendChild(btn);
        });
        document.getElementById('modal').style.display = 'flex';
    }
</script>
</body>
</html>
