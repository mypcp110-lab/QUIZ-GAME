<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>یاری پرسیار و وڵام - پڕۆفیشناڵ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 450px; text-align: center; border: 1px solid #0f3460; }
        h2 { color: #4ecca3; font-size: 24px; margin-bottom: 20px; }
        
        /* شێوازی دوگمەی Import */
        .import-section { margin-bottom: 25px; padding: 15px; border: 2px dashed #4ecca3; border-radius: 10px; }
        input[type="file"] { display: none; }
        .custom-file-upload { background: #4ecca3; color: #1a1a2e; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block; }
        
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #0f3460; color: white; border: 2px solid #4ecca3; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .option-btn:hover { background: #4ecca3; color: #1a1a2e; }
        #next-btn { background: #e94560; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; display: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-ui">
        <h2>بەخێرهاتی بۆ یارییەکە</h2>
        <div class="import-section">
            <p>سەرەتا فایلی پرسیارەکان (JSON) داخڵ بکە:</p>
            <label for="file-upload" class="custom-file-upload">Import JSON 📁</label>
            <input id="file-upload" type="file" accept=".json"/>
        </div>
    </div>

    <div id="quiz-ui" style="display: none;">
        <h2 id="question-text">پرسیار لێرە دەردەکەوێت</h2>
        <div id="options-container"></div>
        <button id="next-btn" onclick="nextQuestion()">پرسیاری داهاتوو ➔</button>
    </div>
</div>

<script>
    let questions = [];
    let currentIdx = 0;

    // ئەم بەشە فایلەکە دەخوێنێتەوە
    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                questions = JSON.parse(event.target.result);
                startQuiz();
            } catch (error) {
                alert("هەڵە هەیە لە فایلی JSON، تکایە دڵنیابەرەوە کە فۆرماتەکەی ڕاستە.");
            }
        };
        reader.readAsText(file);
    });

    function startQuiz() {
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.question;
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, q.answer);
            container.appendChild(btn);
        });
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(selected, correct) {
        if (selected === correct) {
            alert("تەواوە! 🌟");
            document.getElementById('next-btn').style.display = 'inline-block';
        } else {
            alert("وڵامەکە هەڵەیە، دووبارە هەوڵ بدەرەوە.");
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            alert("هەموو پرسیارەکانت تەواو کرد! دەستخۆش.");
            location.reload(); // گەڕانەوە بۆ سەرەتا
        }
    }
</script>

</body>
</html>
