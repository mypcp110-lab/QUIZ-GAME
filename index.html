<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کێبڕکێی گرووپەکان - وەشانی پڕۆ</title>
    <style>
        :root { 
            --main-bg: #0d1117; 
            --card-bg: #161b22; 
            --accent: #58a6ff; 
            --danger: #f85149; 
            --success: #2ea043; 
            --gold: #f2bc1c;
        }

        /* ڕێگری لە دیاریکردنی دەق */
        * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--main-bg); 
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* سیستەمی چوونەژوورەوە */
        #login-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            text-align: center;
            margin-top: 100px;
            width: 300px;
        }

        #login-screen input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            text-align: center;
        }

        /* نۆتفیکەیشن */
        #custom-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            background: var(--accent);
            color: white;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .main-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        /* تەیبڵی خاڵەکان */
        .scoreboard {
            flex: 1;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363d;
            height: fit-content;
        }

        .scoreboard table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .scoreboard th, .scoreboard td {
            border: 1px solid #30363d;
            padding: 12px;
            text-align: center;
        }

        .scoreboard th { background: #21262d; color: var(--gold); }

        /* بەشی کەتەگۆرییەکان (3x3) */
        .categories-section { flex: 3; }
        
        .categories-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
        }

        .category-card {
            background: var(--card-bg);
            padding: 30px 10px;
            border-radius: 12px;
            border: 2px solid #30363d;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
        }

        .category-card:hover { border-color: var(--accent); background: #1c2128; }

        .numbers-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; 
            margin-top: 20px;
        }

        .cell { 
            background: #21262d; 
            border: 1px solid #30363d; 
            color: white; 
            padding: 15px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 18px; 
        }

        .cell.used { background: #0d1117 !important; color: #484f58 !important; opacity: 0.4; }

        .question-box { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            display: none; 
            border: 2px solid var(--accent); 
            width: 80%;
            max-width: 700px;
        }

        /* ئۆپشنەکان (4 دانە) */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn { 
            padding: 15px; 
            background: #21262d; 
            color: white; 
            border: 2px solid #30363d; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 18px; 
        }

        .correct { background: var(--success) !important; }
        .wrong { background: var(--danger) !important; }

        .btn-general {
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="custom-alert"></div>

<!-- شاشەی چوونەژوورەوە -->
<div id="login-screen">
    <h2>چوونەژوورەوە</h2>
    <input type="text" id="username" placeholder="ناوی بەکارهێنەر">
    <input type="password" id="password" placeholder="پاسوۆرد">
    <button class="btn-general" onclick="checkLogin()">داخڵبوون</button>
</div>

<!-- شاشەی داگرتنی فایل -->
<div id="setup-screen" style="display:none; text-align: center;">
    <h1>بەخێرهاتی</h1>
    <input type="file" id="file-input" style="display:none" accept=".json">
    <button class="btn-general" style="padding: 15px 40px;" onclick="document.getElementById('file-input').click()">هەڵبژاردنی فایلی پرسیارەکان</button>
</div>

<!-- یاری سەرەکی -->
<div id="main-game" style="display:none; width: 100%;">
    <center><div id="turn-info" style="font-size: 24px; color: var(--gold); margin-bottom: 20px;">سەرەی: گرووپی ١</div></center>
    
    <div class="main-layout">
        <!-- کەتەگۆرییەکان -->
        <div class="categories-section">
            <div id="categories-view" class="categories-grid"></div>
            <div id="numbers-view" style="display:none">
                <button class="btn-general" onclick="showCategories()">گەڕانەوە</button>
                <h2 id="selected-cat-title"></h2>
                <div id="cells-container" class="numbers-grid"></div>
            </div>
        </div>

        <!-- تەیبڵی خاڵەکان -->
        <div class="scoreboard">
            <h3>خشتەی خاڵەکان</h3>
            <table>
                <tr>
                    <th>گرووپ</th>
                    <th>خاڵ</th>
                    <th>دۆڕان</th>
                </tr>
                <tr>
                    <td>گرووپی ١</td>
                    <td id="g1-win">0</td>
                    <td id="g1-lose">0</td>
                </tr>
                <tr>
                    <td>گرووپی ٢</td>
                    <td id="g2-win">0</td>
                    <td id="g2-lose">0</td>
                </tr>
            </table>
        </div>
    </div>
</div>

<!-- شاشەی پرسیار -->
<div id="quiz-screen" class="question-box">
    <div id="timer" style="font-size: 40px; color: var(--danger); text-align: center;">25</div>
    <p id="question-text" style="font-size: 24px; text-align: center;"></p>
    <div id="options-container" class="options-grid"></div>
</div>

<script>
    let allData = {};
    let currentGroup = 1;
    let timerInterval;
    let usedQuestions = {};
    let scores = { g1w: 0, g1l: 0, g2w: 0, g2l: 0 };
    const categories = ["دەنگ", "مێژوو", "هونەری", "وەرزشی", "منداڵان", "تەندروستی", "زانستی", "کەسی", "ئاینی"];

    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === "admin" && p === "1234") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
        } else {
            notify("ناو یان پاسوۆرد هەڵەیە", "danger");
        }
    }

    function notify(msg, type = 'info') {
        const alertBox = document.getElementById('custom-alert');
        alertBox.innerText = msg;
        alertBox.style.display = 'block';
        alertBox.style.background = type === 'danger' ? 'var(--danger)' : 'var(--accent)';
        setTimeout(() => alertBox.style.display = 'none', 3000);
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                allData = JSON.parse(event.target.result);
                renderCategories();
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'block';
            } catch (err) { notify("فایلەکە تەواو نییە", "danger"); }
        };
        reader.readAsText(file);
    });

    function renderCategories() {
        const container = document.getElementById('categories-view');
        container.innerHTML = '';
        document.getElementById('numbers-view').style.display = 'none';
        container.style.display = 'grid';
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerText = cat;
            card.onclick = () => showNumbers(cat);
            container.appendChild(card);
        });
    }

    function showNumbers(cat) {
        document.getElementById('categories-view').style.display = 'none';
        document.getElementById('numbers-view').style.display = 'block';
        document.getElementById('selected-cat-title').innerText = cat;
        const container = document.getElementById('cells-container');
        container.innerHTML = '';
        for(let i=1; i<=20; i++) {
            const btn = document.createElement('button');
            btn.className = 'cell ' + (usedQuestions[`${cat}-${i}`] ? 'used' : '');
            btn.innerText = i;
            btn.onclick = () => { if(!usedQuestions[`${cat}-${i}`]) startQuestion(cat, i); };
            container.appendChild(btn);
        }
    }

    function showCategories() {
        document.getElementById('numbers-view').style.display = 'none';
        document.getElementById('categories-view').style.display = 'grid';
    }

    function startQuestion(cat, num) {
        const q = allData[cat][num-1];
        if(!q) return notify("پرسیار نییە", "danger");

        document.getElementById('main-game').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('question-text').innerText = q.question;
        
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        // دڵنیابوونەوە لەوەی 4 ئۆپشن هەیە
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = function() { checkAns(this, opt, q.answer, cat, num); };
            optsContainer.appendChild(btn);
        });

        let time = 25;
        document.getElementById('timer').innerText = time;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if(time <= 0) { 
                clearInterval(timerInterval); 
                updateScore(false);
                backToHome(); 
            }
        }, 1000);
    }

    function checkAns(btn, selected, correct, cat, num) {
        clearInterval(timerInterval);
        const isCorrect = selected === correct;
        if(isCorrect) {
            btn.classList.add('correct');
            updateScore(true);
        } else {
            btn.classList.add('wrong');
            updateScore(false);
        }
        usedQuestions[`${cat}-${num}`] = true;
        setTimeout(backToHome, 2000);
    }

    function updateScore(win) {
        if(currentGroup === 1) {
            win ? scores.g1w++ : scores.g1l++;
        } else {
            win ? scores.g2w++ : scores.g2l++;
        }
        document.getElementById('g1-win').innerText = scores.g1w;
        document.getElementById('g1-lose').innerText = scores.g1l;
        document.getElementById('g2-win').innerText = scores.g2w;
        document.getElementById('g2-lose').innerText = scores.g2l;
    }

    function backToHome() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        currentGroup = currentGroup === 1 ? 2 : 1;
        document.getElementById('turn-info').innerText = `سەرەی: گرووپی ${currentGroup}`;
        showCategories();
    }
</script>
</body>
</html>
