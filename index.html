<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>کێبڕکێی گرووپەکان - دیزاینی کۆتایی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { 
            --main-bg: #0b0e14; --card-bg: #161b22; 
            --accent-blue: #58a6ff; --hover-blue: #1f6feb;
            --border-color: #30363d; --text-white: #ffffff;
            --correct: #2ea043; --wrong: #f85149;
        }
        * { user-select: none; box-sizing: border-box; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background: var(--main-bg); color: var(--text-white); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .box-container { background: var(--card-bg); padding: 50px; border-radius: 20px; border: 1px solid var(--accent-blue); text-align: center; width: 450px; }
        .action-btn { background: var(--accent-blue); color: black; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }

        .main-wrapper { display: none; width: 95%; max-width: 1100px; text-align: center; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .category-card { background: var(--card-bg); padding: 45px 15px; border-radius: 15px; border: 1px solid var(--border-color); cursor: pointer; font-size: 24px; font-weight: 900; transition: 0.3s; }
        .category-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }

        .numbers-view { display: none; }
        .numbers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
        .number-cell { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; font-size: 24px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .number-cell.used { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 2px solid var(--accent-blue); width: 90%; max-width: 700px; text-align: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .option-btn { background: #0d1117; border: 1px solid var(--border-color); color: white; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 19px; transition: 0.2s; }
        
        .correct { background: var(--correct) !important; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; border-color: var(--wrong) !important; }
    </style>
</head>
<body>

<div id="setup-screen" class="box-container">
    <h1 style="font-weight: 900; margin-bottom: 30px;">کێبڕکێی گرووپەکان</h1>
    <button class="action-btn" onclick="document.getElementById('file-input').click()">داخڵکردنی فایلی پرسیارەکان</button>
    <input type="file" id="file-input" style="display:none" accept=".json">
</div>

<div id="main-game" class="main-wrapper">
    <div id="categories-view">
        <h2 style="font-weight: 900; font-size: 28px; margin-bottom: 25px;">کەتەگۆرییەکان</h2>
        <div class="categories-grid" id="cat-container"></div>
    </div>
    <div id="numbers-view" class="numbers-view">
        <h1 id="cat-title" style="font-weight: 900; font-size: 38px; color: var(--accent-blue); margin-bottom: 30px;"></h1>
        <div id="num-container" class="numbers-grid"></div>
    </div>
</div>

<div id="question-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-q-text" style="font-weight: 900; font-size: 32px;"></h2>
        <div class="options-grid" id="modal-options"></div>
    </div>
</div>

<script>
    let allData = {};
    let usedQuestions = {};

    document.getElementById('file-input').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                allData = JSON.parse(event.target.result);[cite: 1, 4]
                startApp();
            } catch(err) { alert("هەڵە هەیە لە فایلەکەدا!"); }
        };
        reader.readAsText(e.target.files[0]);
    });

    function startApp() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        const container = document.getElementById('cat-container');
        container.innerHTML = '';
        
        // دروستکردنی دوگمەکان تەنها بۆ ئەو کەتەگۆرییانەی لە فایلەکەدا هەن[cite: 3, 4]
        Object.keys(allData).forEach(cat => {
            const div = document.createElement('div');
            div.className = 'category-card';
            div.innerText = cat;
            div.onclick = () => showNumbers(cat);
            container.appendChild(div);
        });
    }

    function showNumbers(cat) {
        document.getElementById('categories-view').style.display = 'none';
        document.getElementById('numbers-view').style.display = 'block';
        document.getElementById('cat-title').innerText = cat;
        const container = document.getElementById('num-container');
        container.innerHTML = '';
        
        const categoryQuestions = allData[cat] || [];[cite: 1, 4]

        // دروستکردنی ژمارە تەنها بەپێی ئەو پرسیارانەی لە فایلەکەدا هەن بۆ ئەو کەتەگۆرییە[cite: 2, 4]
        categoryQuestions.forEach((q, index) => {
            const btn = document.createElement('div');
            const key = `${cat}-${index}`;
            btn.className = 'number-cell' + (usedQuestions[key] ? ' used' : '');
            btn.innerText = index + 1;
            btn.onclick = () => { if(!usedQuestions[key]) openModal(q, key); };
            container.appendChild(btn);
        });
    }

    function openModal(qData, key) {
        document.getElementById('modal-q-text').innerText = qData.question;[cite: 4]
        const optBox = document.getElementById('modal-options');
        optBox.innerHTML = '';
        
        qData.options.forEach(opt => {[cite: 4]
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                const btns = optBox.querySelectorAll('button');
                btns.forEach(btn => btn.disabled = true);
                usedQuestions[key] = true;

                if(opt === qData.answer) {[cite: 4]
                    b.classList.add('correct');
                } else {
                    b.classList.add('wrong');
                    btns.forEach(btn => { if(btn.innerText === qData.answer) btn.classList.add('correct'); });
                }

                setTimeout(() => {
                    document.getElementById('question-modal').style.display = 'none';
                    document.getElementById('numbers-view').style.display = 'none';
                    document.getElementById('categories-view').style.display = 'block';
                }, 1000);
            };
            optBox.appendChild(b);
        });
        document.getElementById('question-modal').style.display = 'flex';
    }
</script>
</body>
</html>
