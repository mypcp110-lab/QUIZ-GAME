<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>کێبڕکێی کۆتایی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { --bg: #0b0e14; --card: #161b22; --blue: #58a6ff; --correct: #2ea043; --wrong: #f85149; }
        * { user-select: none; box-sizing: border-box; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .wrapper { width: 95%; max-width: 1000px; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 40px 10px; border-radius: 15px; border: 1px solid #30363d; cursor: pointer; font-size: 22px; font-weight: 900; transition: 0.3s; }
        .card:hover { border-color: var(--blue); transform: translateY(-3px); }
        .num-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 10px; margin-top: 20px; }
        .num-cell { background: var(--card); border: 1px solid #30363d; padding: 20px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .num-cell.used { opacity: 0.2; cursor: not-allowed; background: #000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 20px; border: 2px solid var(--blue); width: 90%; max-width: 650px; text-align: center; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .opt-btn { background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 18px; }
        .correct { background: var(--correct) !important; border-color: var(--correct) !important; color: white !important; }
        .wrong { background: var(--wrong) !important; border-color: var(--wrong) !important; color: white !important; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="cat-view">
        <h1 style="font-weight:900; font-size: 35px; color: var(--blue);">کەتەگۆرییەکان</h1>
        <div id="cat-grid" class="grid"></div>
    </div>

    <div id="num-view" style="display:none">
        <h1 id="title" style="color:var(--blue); font-weight:900; font-size: 32px;"></h1>
        <div id="num-grid" class="num-grid"></div>
        <button onclick="backToCats()" style="margin-top:30px; background:#333; border:none; color:white; padding:10px 25px; border-radius:5px; cursor:pointer;">گەڕانەوە</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="q-text" style="font-size: 28px; font-weight:900; line-height: 1.5;"></h2>
        <div id="opts" class="opt-grid"></div>
    </div>
</div>

<script>
    // لێرەدا داتاکانی data_2.json جێگیر کراوە
    const quizData = {
        "کەسی": [
            { "question": "باشترین دەنگ؟", "options": ["گۆران حاجی حمەخان", "بەنگین", "ئارام مستەوفی", "گۆران ناضم"], "answer": "گۆران ناضم" },
            { "question": "ناوی (لیۆ) واتای چییە؟", "options": ["لیۆنێل مێسی", "شێر", "سیروان حەزیلێبوو", "هیچ مانای نییە"], "answer": "شێر" },
            { "question": "فیلمی سینەمایی (هاوڕێی ترسنۆک) ساڵی چەند بڵاوکرایەوە؟", "options": ["2014", "2015", "2016", "2017"], "answer": "2015" }
        ],
        "ئاینی": [ { "question": "ناوی پێغەمبەری ئیسلام چییە (د.خ)؟", "options": ["محمد", "ابراهیم", "موسی"], "answer": "محمد" } ],
        "دەنگ": [ { "question": "گۆران ناضم لەچیدا سەرکەوتووە؟", "options": ["دۆبلاژ", "کاروباری ئەوقاف", "هەموو شتێك", "هیچیان"], "answer": "هەموو شتێك" } ],
        "مێژوو": [ { "question": "گۆران ناضم لەچیدا سەرکەوتووە؟", "options": ["دۆبلاژ", "کاروباری ئەوقاف", "هەموو شتێك", "هیچیان"], "answer": "هەموو شتێك" } ],
        "هونەری": [ { "question": "گۆران ناضم لەچیدا سەرکەوتووە؟", "options": ["دۆبلاژ", "کاروباری ئەوقاف", "هەموو شتێك", "هیچیان"], "answer": "هەموو شتێك" } ],
        "وەرزشی": [ { "question": "گۆران ناضم لەچیدا سەرکەوتووە؟", "options": ["دۆبلاژ", "کاروباری ئەوقاف", "هەموو شتێك", "هیچیان"], "answer": "هەموو شتێك" } ],
        "منداڵان": [ { "question": "گۆران ناضم لەچیدا سەرکەوتووە؟", "options": ["دۆبلاژ", "کاروباری ئەوقاف", "هەموو شتێك", "هیچیان"], "answer": "هەموو شتێك" } ],
        "تەندروستی": [ { "question": "گۆران ناضم لەچیدا سەرکەوتووە؟", "options": ["دۆبلاژ", "کاروباری ئەوقاف", "هەموو شتێك", "هیچیان"], "answer": "هەموو شتێك" } ],
        "زانستی": [ { "question": "گۆران ناضم لەچیدا سەرکەوتووە؟", "options": ["دۆبلاژ", "کاروباری ئەوقاف", "هەموو شتێك", "هیچیان"], "answer": "هەموو شتێك" } ]
    };

    let used = {};

    function backToCats() {
        document.getElementById('num-view').style.display = 'none';
        document.getElementById('cat-view').style.display = 'block';
    }

    function initCats() {
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = '';
        Object.keys(quizData).forEach(catName => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = catName;
            card.onclick = () => showNumbers(catName);
            grid.appendChild(card);
        });
    }

    function showNumbers(catName) {
        document.getElementById('cat-view').style.display = 'none';
        const numView = document.getElementById('num-view');
        numView.style.display = 'block';
        document.getElementById('title').innerText = catName;
        
        const grid = document.getElementById('num-grid');
        grid.innerHTML = '';
        
        const questions = quizData[catName];[cite: 1]
        questions.forEach((q, index) => {
            const cell = document.createElement('div');
            const questionId = catName + index;
            cell.className = 'num-cell' + (used[questionId] ? ' used' : '');
            cell.innerText = index + 1;
            cell.onclick = () => {
                if (!used[questionId]) openQuestion(q, questionId);
            };
            grid.appendChild(cell);
        });
    }

    function openQuestion(q, id) {
        document.getElementById('q-text').innerText = q.question;
        const optGrid = document.getElementById('opts');
        optGrid.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const buttons = optGrid.querySelectorAll('button');
                buttons.forEach(b => b.disabled = true);
                used[id] = true;
                
                if (opt === q.answer) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    buttons.forEach(b => {
                        if (b.innerText === q.answer) b.classList.add('correct');
                    });
                }
                
                setTimeout(() => {
                    document.getElementById('modal').style.display = 'none';
                    backToCats();
                }, 1500);
            };
            optGrid.appendChild(btn);
        });
        document.getElementById('modal').style.display = 'flex';
    }

    // دەستپێکردنی بەرنامەکە
    initCats();
</script>
</body>
</html>
