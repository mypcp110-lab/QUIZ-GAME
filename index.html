<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>کێبڕکێ - وەشانی کۆتایی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { --main: #0b0e14; --card: #161b22; --blue: #58a6ff; --correct: #2ea043; --wrong: #f85149; }
        * { user-select: none; box-sizing: border-box; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background: var(--main); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .setup-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--blue); text-align: center; }
        .btn { background: var(--blue); color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .main-game { display: none; width: 90%; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 40px 20px; border-radius: 15px; border: 1px solid #30363d; cursor: pointer; font-size: 22px; font-weight: 900; transition: 0.3s; }
        .card:hover { border-color: var(--blue); }
        .num-cell { background: var(--card); border: 1px solid #30363d; padding: 20px; font-size: 20px; border-radius: 10px; cursor: pointer; }
        .num-cell.used { opacity: 0.2; cursor: not-allowed; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 99; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 20px; border: 2px solid var(--blue); width: 600px; text-align: center; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .opt-btn { background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 18px; }
        .correct { background: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; }
    </style>
</head>
<body>

<div id="setup" class="setup-box">
    <h2 style="margin-bottom:20px">فایلەکە لێرە داخڵ بکە</h2>
    <button class="btn" onclick="document.getElementById('f').click()">هەڵبژاردنی فایل</button>
    <input type="file" id="f" style="display:none" accept=".json">
</div>

<div id="game" class="main-game">
    <div id="cat-view">
        <h1 style="font-weight:900">کەتەگۆرییەکان</h1>
        <div id="cat-grid" class="grid"></div>
    </div>
    <div id="num-view" style="display:none">
        <h1 id="title" style="color:var(--blue)"></h1>
        <div id="num-grid" class="grid"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="q-text"></h2>
        <div id="opts" class="opt-grid"></div>
    </div>
</div>

<script>
    let data = {};
    let used = {};

    document.getElementById('f').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                data = JSON.parse(ev.target.result);[cite: 1]
                document.getElementById('setup').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                showCats();
            } catch(err) { alert("فایلەکە کێشەی تێدایە!"); }
        };
        reader.readAsText(e.target.files[0]);
    };

    function showCats() {
        document.getElementById('num-view').style.display = 'none';
        document.getElementById('cat-view').style.display = 'block';
        const g = document.getElementById('cat-grid');
        g.innerHTML = '';
        Object.keys(data).forEach(c => {[cite: 3]
            let div = document.createElement('div');
            div.className = 'card';
            div.innerText = c;
            div.onclick = () => showNums(c);
            g.appendChild(div);
        });
    }

    function showNums(c) {
        document.getElementById('cat-view').style.display = 'none';
        document.getElementById('num-view').style.display = 'block';
        document.getElementById('title').innerText = c;
        const g = document.getElementById('num-grid');
        g.innerHTML = '';
        data[c].forEach((q, i) => {[cite: 1, 2]
            let n = document.createElement('div');
            let key = c + i;
            n.className = 'num-cell' + (used[key] ? ' used' : '');
            n.innerText = i + 1;
            n.onclick = () => { if(!used[key]) openQ(q, key); };
            g.appendChild(n);
        });
    }

    function openQ(q, key) {
        document.getElementById('q-text').innerText = q.question;
        const o = document.getElementById('opts');
        o.innerHTML = '';
        q.options.forEach(opt => {
            let b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt;
            b.onclick = () => {
                const all = o.querySelectorAll('button');
                all.forEach(x => x.disabled = true);
                used[key] = true;
                if(opt === q.answer) b.classList.add('correct');
                else {
                    b.classList.add('wrong');
                    all.forEach(x => { if(x.innerText === q.answer) x.classList.add('correct'); });
                }
                setTimeout(() => {
                    document.getElementById('modal').style.display = 'none';
                    showCats();
                }, 1000);
            };
            o.appendChild(b);
        });
        document.getElementById('modal').style.display = 'flex';
    }
</script>
</body>
</html>
