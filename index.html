<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کێبڕکێی گرووپەکان - ڤێرژنی چاککراو</title>
    <style>
        :root { --main-bg: #0d1117; --card-bg: #161b22; --accent: #58a6ff; --danger: #f85149; --success: #2ea043; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--main-bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .setup-screen, .quiz-screen { width: 98%; max-width: 1400px; text-align: center; margin-top: 20px; }
        .categories-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        @media (min-width: 1000px) { .categories-grid { grid-template-columns: repeat(9, 1fr); } }
        .category-column { background: var(--card-bg); padding: 8px; border-radius: 10px; border: 1px solid #30363d; }
        .category-name { font-weight: bold; margin-bottom: 10px; color: var(--accent); font-size: 16px; border-bottom: 2px solid var(--accent); padding-bottom: 5px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .cells-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
        .cell { background: #21262d; border: 1px solid #30363d; color: white; padding: 8px 0; cursor: pointer; border-radius: 5px; font-size: 14px; }
        .cell.used { background: #0d1117 !important; color: #484f58 !important; cursor: not-allowed; border: 1px dashed #30363d; }
        .question-box { background: var(--card-bg); padding: 40px; border-radius: 20px; margin-top: 30px; display: none; border: 2px solid var(--accent); width: 85%; }
        #question-text { font-size: 26px; margin-bottom: 25px; line-height: 1.5; }
        .timer { font-size: 40px; color: var(--danger); font-weight: bold; margin-bottom: 20px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #21262d; color: white; border: 2px solid #30363d; border-radius: 10px; cursor: pointer; font-size: 20px; }
        .correct { background-color: var(--success) !important; }
        .wrong { background-color: var(--danger) !important; }
        .group-info { margin-bottom: 15px; font-size: 22px; color: #fff; background: #21262d; padding: 10px 25px; border-radius: 50px; border: 1px solid var(--accent); }
        .import-btn { background: var(--accent); color: white; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; border: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-screen">
        <h1>بەخێرهاتی بۆ کێبڕکێ</h1>
        <p>فایلی JSON ئامادە بکە و لێرە دایبنێ</p>
        <input type="file" id="file-input" style="display:none" accept=".json">
        <button class="import-btn" onclick="document.getElementById('file-input').click()">هەڵبژاردنی فایلی پرسیارەکان</button>
    </div>

    <div id="main-game" style="display:none" class="setup-screen">
        <div class="group-info" id="turn-info">سەرەی: گرووپی ١</div>
        <div class="categories-grid" id="categories-container"></div>
    </div>

    <div id="quiz-screen" class="question-box">
        <div class="timer" id="timer">25</div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

<script>
    let allData = {};
    let currentGroup = 1;
    let timerInterval;
    const categories = ["دەنگ", "مێژوو", "هونەری", "وەرزشی", "منداڵان", "تەندروستی", "زانستی", "کەسی", "ئاینی"];

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                allData = data;
                renderGrid();
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('main-game').style.display = 'block';
            } catch (err) {
                alert("خەتایەک لە فایلی JSON هەیە: " + err.message);
            }
        };
        reader.readAsText(file);
    });

    function renderGrid() {
        const container = document.getElementById('categories-container');
        container.innerHTML = '';
        categories.forEach(cat => {
            const col = document.createElement('div');
            col.className = 'category-column';
            // لێرە چاککراوە: بەکارهێنانی Backticks
            col.innerHTML = `<div class="category-name">${cat}</div>`;
            
            const cellsDiv = document.createElement('div');
            cellsDiv.className = 'cells-grid';
            
            for(let i=1; i<=20; i++) {
                const btn = document.createElement('button');
                btn.className = 'cell';
                // لێرە چاککراوە: ناسێنەرەکە خراوەتە ناو کەوانە
                btn.id = `cell-${cat}-${i}`;
                btn.innerText = i;
                btn.onclick = () => startQuestion(cat, i);
                cellsDiv.appendChild(btn);
            }
            col.appendChild(cellsDiv);
            container.appendChild(col);
        });
    }

    function startQuestion(cat, num) {
        if (!allData[cat] || !allData[cat][num-1]) {
            alert("ئەم پرسیارە لە فایلەکەدا نەدۆزرایەوە!");
            return;
        }

        const q = allData[cat][num-1];
        document.getElementById('main-game').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('question-text').innerText = q.question;
        
        const opts = document.getElementById('options-container');
        opts.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = function() { checkAns(this, opt, q.answer, cat, num); };
            opts.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        let time = 25;
        document.getElementById('timer').innerText = time;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if(time <= 0) {
                clearInterval(timerInterval);
                alert("کات تەواو بوو!");
                backToHome();
            }
        }, 1000);
    }

    function checkAns(btn, selected, correct, cat, num) {
        clearInterval(timerInterval);
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(selected === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        setTimeout(() => {
            const cellId = `cell-${cat}-${num}`;
            const cell = document.getElementById(cellId);
            if(cell) {
                cell.classList.add('used');
                cell.disabled = true;
                cell.onclick = null;
            }
            backToHome();
        }, 3000);
    }

    function backToHome() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        currentGroup = currentGroup === 1 ? 2 : 1;
        // لێرە چاککراوە: تێکستەکە خراوەتە ناو Backticks
        document.getElementById('turn-info').innerText = `سەرەی: گرووپی ${currentGroup}`;
    }
</script>
</body>
</html>
