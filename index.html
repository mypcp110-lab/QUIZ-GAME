<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کێبڕکێی گرووپەکان - وەشانی خێرا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { 
            --main-bg: #0b0e14; --card-bg: #161b22; 
            --accent-blue: #58a6ff; --hover-blue: #1f6feb;
            --border-color: #30363d; --text-white: #ffffff;
            --correct: #2ea043; --wrong: #f85149;
        }
        * { user-select: none; box-sizing: border-box; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background: var(--main-bg); color: var(--text-white); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .box-container { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--accent-blue); text-align: center; width: 380px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid var(--border-color); border-radius: 8px; color: white; text-align: center; outline: none; }
        .login-btn, .action-btn { background: var(--accent-blue); color: black; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        .main-wrapper { display: none; width: 95%; max-width: 1100px; text-align: center; }
        .categories-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .category-card { background: var(--card-bg); padding: 50px 20px; border-radius: 15px; border: 1px solid var(--border-color); cursor: pointer; font-size: 24px; font-weight: 900; transition: 0.3s; }
        .category-card:hover { border-color: var(--accent-blue); transform: translateY(-5px); }

        .numbers-view { display: none; }
        .numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 800px; margin: 0 auto; }
        .number-cell { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; font-size: 22px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .number-cell.used { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 2px solid var(--accent-blue); width: 90%; max-width: 700px; text-align: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .option-btn { background: #0d1117; border: 1px solid var(--border-color); color: white; padding: 18px; border-radius: 10px; cursor: pointer; font-size: 19px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { background: var(--hover-blue); }
        
        .correct { background: var(--correct) !important; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; border-color: var(--wrong) !important; }
    </style>
</head>
<body>

<div id="login-screen" class="box-container">
    <h2 style="font-weight:900">چوونەژوورەوە</h2>
    <input type="text" id="user" placeholder="UserName">
    <input type="password" id="pass" placeholder="Password">
    <button class="login-btn" onclick="handleLogin()">Login</button>
</div>

<div id="setup-screen" style="display:none" class="box-container">
    <h1 style="font-weight:900">بەخێربێن</h1>
    <button class="action-btn" onclick="document.getElementById('file-input').click()">Import JSON</button>
    <input type="file" id="file-input" style="display:none" accept=".json">
</div>

<div id="main-game" class="main-wrapper">
    <div id="categories-view">
        <div class="categories-grid" id="cat-container"></div>
    </div>
    <div id="numbers-view" class="numbers-view">
        <h1 id="cat-title" style="font-weight:900; color:var(--accent-blue)"></h1>
        <div id="num-container" class="numbers-grid"></div>
    </div>
</div>

<div id="question-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-q-text" style="font-weight:900; font-size:30px"></h2>
        <div class="options-grid" id="modal-options"></div>
    </div>
</div>

<script>
    let allData = {};
    let usedQuestions = {};
    const categories = ["دەنگ", "مێژوو", "هونەری", "وەرزشی", "منداڵان", "تەندروستی", "زانستی", "کەسی", "ئاینی"];

    function handleLogin() {
        if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "1234") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
        } else { alert("هەڵەیە!"); }
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                allData = JSON.parse(event.target.result);[cite: 1, 2, 3]
                startApp();
            } catch(e) { alert("هەڵە لە فایلەکەدا هەیە!"); }
        };
        reader.readAsText(e.target.files[0]);
    });

    function startApp() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';
        const container = document.getElementById('cat-container');
        container.innerHTML = '';
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'category-card';
            div.innerText = cat;
            div.onclick = () => showNumbers(cat);
            container.appendChild(div);
        });
    }

    function showNumbers(cat) {
        document.getElementById('categories-view').style.display = 'none';
        document.getElementById('numbers-view').style.display = 'block';
        document.getElementById('cat-title').innerText = cat;
        const container = document.getElementById('num-container');
        container.innerHTML = '';
        const data = allData[cat] || [];[cite: 1, 2]

        for(let i=0; i<20; i++) {
            const btn = document.createElement('div');
            const key = `${cat}-${i}`;
            btn.className = 'number-cell' + (usedQuestions[key] ? ' used' : '');
            btn.innerText = i + 1;
            btn.onclick = () => { if(!usedQuestions[key] && data[i]) openModal(data[i], key); };
            container.appendChild(btn);
        }
    }

    function openModal(qData, key) {
        document.getElementById('modal-q-text').innerText = qData.question;
        const optBox = document.getElementById('modal-options');
        optBox.innerHTML = '';
        
        qData.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                const btns = optBox.querySelectorAll('button');
                btns.forEach(btn => btn.disabled = true);
                usedQuestions[key] = true;

                if(opt === qData.answer) {
                    b.classList.add('correct');
                } else {
                    b.classList.add('wrong');
                    btns.forEach(btn => { if(btn.innerText === qData.answer) btn.classList.add('correct'); });
                }

                // گەڕانەوەی ئۆتۆماتیکی دوای ١ چرکە بەبێ دوگمەی داخستن
                setTimeout(() => {
                    document.getElementById('question-modal').style.display = 'none';
                    document.getElementById('numbers-view').style.display = 'none';
                    document.getElementById('categories-view').style.display = 'block';
                }, 1000);
            };
            optBox.appendChild(b);
        });
        document.getElementById('question-modal').style.display = 'flex';
    }
</script>
</body>
</html>
